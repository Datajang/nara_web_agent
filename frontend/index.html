<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nara-web</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<div id="auth-overlay" class="hidden">
  <div id="login-form">
    <div id="login-panel">
      <h2>로그인</h2>
      <input id="email" type="email" placeholder="이메일" />
      <input id="password" type="password" placeholder="비밀번호" />
      <button id="login-btn">로그인</button>
      <button id="go-register-btn">회원가입</button>
      <p id="auth-error" class="error hidden"></p>
    </div>
    <div id="register-panel" class="hidden">
      <h2>회원가입</h2>
      <input id="reg-email" type="email" placeholder="이메일" />
      <input id="reg-password" type="password" placeholder="비밀번호" />
      <button id="register-btn">가입하기</button>
      <button id="go-login-btn">로그인으로 돌아가기</button>
      <p id="reg-error" class="error hidden"></p>
    </div>
  </div>
</div>

<div id="profile-modal" class="hidden">
  <div id="profile-modal-inner">
    <h3>부서 프로필</h3>
    <textarea id="profile-textarea" rows="6" placeholder="부서 정보, 담당 업무, 전문 분야 등을 입력하세요..."></textarea>
    <div class="modal-actions">
      <button id="profile-save-btn">저장</button>
      <button id="profile-cancel-btn">취소</button>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <span id="user-email"></span>
    <button id="logout-btn">로그아웃</button>
  </header>
  <div>
    <aside id="sidebar">
      <button id="new-conv-btn">+ 새 대화</button>
      <div id="conv-list"></div>
      <hr />
      <div id="bookmark-list"><strong>🔖 북마크</strong></div>
    </aside>
    <main>
      <div id="project-bar">
        <select id="project-select"></select>
        <button id="new-project-btn">+ 프로젝트</button>
        <button id="edit-profile-btn">부서 프로필</button>
      </div>
      <div id="chat-messages"></div>
      <div id="new-search-bar" class="hidden">
        <button id="new-search-btn">🔍 새 검색 시작</button>
      </div>
      <div id="input-area">
        <textarea id="msg-input" rows="2" placeholder="메시지를 입력하세요..."></textarea>
        <button id="stop-btn" class="hidden">중단 ✕</button>
        <button id="send-btn">전송 ↵</button>
      </div>
    </main>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
